name: Build and Deploy

on:
  push:
    branches:
      - main
      - production

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" == "production" ]; then
            echo "image_tag=latest" >> $GITHUB_OUTPUT
            echo "fly_config=front-end/fly.toml" >> $GITHUB_OUTPUT
            echo "convex_url=${{ secrets.VITE_CONVEX_URL_PROD }}" >> $GITHUB_OUTPUT
            echo "clerk_key=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY_PROD }}" >> $GITHUB_OUTPUT
          else
            echo "image_tag=staging" >> $GITHUB_OUTPUT
            echo "fly_config=front-end/fly.staging.toml" >> $GITHUB_OUTPUT
            echo "convex_url=${{ secrets.VITE_CONVEX_URL_STAGING }}" >> $GITHUB_OUTPUT
            echo "clerk_key=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY_STAGING }}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: front-end/Dockerfile
          push: true
          build-args: |
            VITE_CLERK_PUBLISHABLE_KEY=${{ steps.env.outputs.clerk_key }}
            VITE_CONVEX_URL=${{ steps.env.outputs.convex_url }}
          tags: |
            georgiamartinez/wiki-dash:${{ steps.env.outputs.image_tag }}
            georgiamartinez/wiki-dash:${{ github.sha }}

      - name: Install flyctl
        run: curl -L https://fly.io/install.sh | sh && echo "$HOME/.fly/bin" >> $GITHUB_PATH

      - name: Deploy frontend to Fly
        run: flyctl deploy --config ${{ steps.env.outputs.fly_config }} --image georgiamartinez/wiki-dash:${{ steps.env.outputs.image_tag }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" == "production" ]; then
            echo "fly_config=back-end/fly.toml" >> $GITHUB_OUTPUT
          else
            echo "fly_config=back-end/fly.staging.toml" >> $GITHUB_OUTPUT
          fi

      - name: Install flyctl
        run: curl -L https://fly.io/install.sh | sh && echo "$HOME/.fly/bin" >> $GITHUB_PATH

      - name: Deploy backend to Fly
        run: flyctl deploy --config ${{ steps.env.outputs.fly_config }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # Pushes convex/ functions (queries, mutations, crons) to the self-hosted backend.
  # Requires repo secrets: CONVEX_SELF_HOSTED_ADMIN_KEY_STAGING, CONVEX_SELF_HOSTED_ADMIN_KEY_PROD
  # (generate with ./generate_admin_key.sh on each Fly backend). URLs reuse VITE_CONVEX_* secrets.
  deploy-convex-functions:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Convex deploy credentials
        id: convex
        run: |
          if [ "${{ github.ref_name }}" == "production" ]; then
            echo "url=${{ secrets.VITE_CONVEX_URL_PROD }}" >> $GITHUB_OUTPUT
            echo "admin_key=${{ secrets.CONVEX_SELF_HOSTED_ADMIN_KEY_PROD }}" >> $GITHUB_OUTPUT
          else
            echo "url=${{ secrets.VITE_CONVEX_URL_STAGING }}" >> $GITHUB_OUTPUT
            echo "admin_key=${{ secrets.CONVEX_SELF_HOSTED_ADMIN_KEY_STAGING }}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: back-end/package-lock.json

      - name: Install dependencies
        working-directory: back-end
        run: npm ci

      - name: Deploy Convex functions
        working-directory: back-end
        env:
          CONVEX_SELF_HOSTED_URL: ${{ steps.convex.outputs.url }}
          CONVEX_SELF_HOSTED_ADMIN_KEY: ${{ steps.convex.outputs.admin_key }}
        run: npx convex deploy -y
